<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مكتبة الرواد - الأقسام</title>
  <style>
    /* التنسيق العام المتوافق مع ملف الحقائب */
    body {
      font-family: "Tahoma", sans-serif;
      background: #f8f9fa;
      margin: 0;
      padding: 0;
      text-align: center;
      direction: rtl; /* التوجيه من اليمين لليسار */
    }

    header {
      background: #0096c7; /* نفس لون هيدر الحقائب */
      color: #fff;
      padding: 30px;
      font-size: 28px;
      font-weight: bold;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    h3 {
      margin-top: 30px;
      color: #333;
    }

    p {
      color: #666;
      margin-bottom: 30px;
    }