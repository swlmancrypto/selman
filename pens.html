<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>قسم الأقلام</title>
  <style>
    body {font-family: "Tahoma", sans-serif;background: #f8f9fa;margin: 0;padding: 0;text-align: center;direction: rtl;}
    header {background: #ef476f;color: #fff;padding: 20px;font-size: 24px;}
    .products {display: grid;grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));gap: 20px;padding: 30px;}
    .item {background: #fff;border-radius: 15px;padding: 20px;box-shadow: 0 4px 10px rgba(0,0,0,0.1);}
    .item img {width: 100%;height: 180px;object-fit: contain;margin-bottom: 10px;}
    .item h3 {margin: 0;font-size: 18px;color: #333;}
    a.back {display: inline-block;margin: 20px;padding: 10px 20px;background: #ef476f;color: #fff;text-decoration: none;border-radius: 8px;}
    a.back:hover {background: #d62839;}
  </style>
</head>
<body>

  <header>قسم الأقلام</header>

  <div class="products">
    <div class="item"><img src="images/pen1.png" alt="قلم حبر"><h3>قلم حبر</h3></div>
    <div class="item"><img src="images/pen2.png" alt="قلم رصاص"><h3>قلم رصاص</h3></div>
    <div class="item"><img src="images/pen3.png" alt="قلم ألوان"><h3>قلم ألوان</h3></div>
  </div>

  <a href="1.html" class="back">⬅ العودة للأقسام</a>

</body>
